name: Refresh Hyperscaler News

on:
  schedule:
    # 08:25 KST every day.
    - cron: "25 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: hyperscaler-news-refresh
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Refresh hyperscaler news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: |
          python3 scripts/fetch_hyperscaler_news.py --limit 160
          python3 scripts/translate_hyperscaler_news.py

      - name: Test
        run: npm test

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hyperscaler-news/articles.json data/hyperscaler-news/sources.json data/hyperscaler-news/translation_cache.json
          if git diff --cached --quiet; then
            echo "No hyperscaler news changes to commit."
          else
            git commit -m "Refresh hyperscaler data center news"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
